version: 2
updates:
  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies
    ignore:
      # yt-dlp uses date-based versioning and YouTube extraction breaks between
      # versions. Update manually after integration testing.
      - dependency-name: yt-dlp
        update-types:
          - version-update:semver-patch
          - version-update:semver-minor

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies

  # `directories` with a glob, not `directory: /`. The github-actions ecosystem scans
  # .github/workflows/ plus a root action.yml — and nothing else. Moving the shared
  # setup steps into .github/actions/setup-python-env/ therefore took actions/checkout,
  # actions/setup-python and actions/cache out of Dependabot's view entirely: a
  # security advisory against any of them would open no PR, silently and indefinitely.
  # (dependabot-core#6704 is open upstream; the two adjacent requests were declined.)
  # Only `directories` accepts globs.
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/*
    schedule:
      interval: weekly
    labels:
      - dependencies

  # Keeps .pre-commit-config.yaml's pinned revs current. The ruff hook's rev must
  # stay in step with the ruff constraint in pyproject.toml's lint group — the
  # hook runs ruff from its own isolated env, so a drift means the hook formats
  # one way and `just lint`/CI check another. When Dependabot bumps one, bump the
  # other in the same PR (`just hooks-update` does the config side).
  - package-ecosystem: pre-commit
    directory: /
    schedule:
      interval: weekly
    labels:
      - dependencies
