name: Security

on:
  # Was a bare `push:` — every push to every branch ran a full audit whose result
  # is a function of poetry.lock alone, so parallel task branches sharing a lock
  # re-ran an identical scan. main + PRs + the weekly cron covers the same ground:
  # nothing reaches main without passing through one of them, and the cron catches
  # advisories published after a lock stops changing.
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Least privilege by default — see the same block in ci.yml. Auditing a lockfile
# needs to read the repository and nothing more, but the org default hands out a
# write-all token to any workflow that does not say otherwise.
permissions:
  contents: read

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # install: false — `poetry export` reads poetry.lock and never touches a
      # virtualenv, so this job used to build the full lint environment (pyright plus
      # its bundled Node runtime) on every push and PR to produce a text file.
      - uses: ./.github/actions/setup-python-env
        with:
          cache-prefix: audit
          install: 'false'
          poetry-plugins: poetry-plugin-export

      # `--with=test,lint` is load-bearing now that those groups are optional in
      # pyproject.toml — without it the audit would silently cover runtime
      # dependencies only. (While the groups were non-optional this flag was a no-op
      # that happened to describe what poetry did anyway.)
      - name: Export requirements for pip-audit
        run: poetry export --without-hashes --with=test,lint -f requirements.txt -o requirements-audit.txt

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements-audit.txt
