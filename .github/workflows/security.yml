name: Security

on:
  push:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday at 08:00 UTC
  workflow_dispatch:

jobs:
  pip-audit:
    name: Python Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry==2.1.3 poetry-plugin-export

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --only=main,test,lint --no-root

      - name: Export requirements for pip-audit
        run: poetry export --without-hashes --with=test,lint -f requirements.txt -o requirements-audit.txt

      - name: Run pip-audit
        uses: pypa/gh-action-pip-audit@v1.1.0
        with:
          inputs: requirements-audit.txt
