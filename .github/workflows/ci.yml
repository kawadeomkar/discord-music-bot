name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Supersedes three pushes to a PR racing three full pipelines. Never cancel on
# main: an aborted main run means no image was published for that commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.env_name.outputs.name }}
    steps:
      - name: Compute environment name
        id: env_name
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          [ "$BRANCH" = "main" ] && echo "name=production" >> $GITHUB_OUTPUT || echo "name=$BRANCH" >> $GITHUB_OUTPUT

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-env
        with:
          # `test` is here for pyright, not to run tests: it type-checks tests/,
          # which imports pytest and fakeredis. Without them every such import is
          # an unresolved-import error.
          groups: main,lint,test
          cache-prefix: lint-main-lint-test

      - name: ruff format --check
        run: poetry run ruff format --check src/ tests/

      - name: ruff check
        run: poetry run ruff check src/ tests/

      # No path argument: check src/ AND tests/, matching the bare `pyright`
      # developers run locally via `make types`. Checking only src/ is what let
      # tests/ accumulate 67 type errors unnoticed.
      - name: pyright
        run: poetry run pyright

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: resolve-env
    env:
      ENVIRONMENT: ${{ needs.resolve-env.outputs.name }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-env
        with:
          groups: main,test
          cache-prefix: test-main-test

      - name: Run tests with coverage
        run: |
          set -o pipefail
          poetry run pytest --tb=short -q --cov-report=xml --junitxml=pytest.xml | tee pytest-coverage.txt

      - name: Coverage comment
        id: coverage_comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml
          title: Test Coverage Report
          badge-title: Coverage

  container-test:
    name: Container Test
    runs-on: ubuntu-latest
    needs: resolve-env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test stage
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test
          load: true
          tags: discord-music-bot:test
          build-args: |
            ENVIRONMENT=${{ needs.resolve-env.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests in container
        run: docker run --rm discord-music-bot:test

  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: [resolve-env, lint, test, container-test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    # This job used to live in a separate build.yml triggered by `workflow_run`.
    # That was a provenance hole: for the workflow_run event GITHUB_SHA is
    # documented as "last commit on default branch", NOT the commit whose CI just
    # passed — so a bare `actions/checkout` plus metadata-action's `type=sha`
    # could publish an image tagged with a SHA whose contents it did not contain,
    # any time a second merge landed during the first one's run. As a job here it
    # inherits the correct SHA, reuses the BuildKit cache container-test just
    # warmed, and is testable from a PR at all (workflow_run always executes the
    # DEFAULT branch's copy of the workflow file).
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          # The job only runs on main (see `if:` above), so `latest` needs no
          # further branch condition.
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime
          push: true
          # build.yml never passed this. It changes nothing today — the job only
          # runs on main, where the resolved name and the Dockerfile's runtime
          # default are both "production" — but relying on two independent
          # defaults agreeing is not a property worth depending on.
          build-args: |
            ENVIRONMENT=${{ needs.resolve-env.outputs.name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: |
            type=gha
            type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=gha,mode=max
