name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  resolve-env:
    name: Resolve Environment
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.env_name.outputs.name }}
    steps:
      - name: Compute environment name
        id: env_name
        run: |
          BRANCH="${{ github.head_ref || github.ref_name }}"
          [ "$BRANCH" = "main" ] && echo "name=production" >> $GITHUB_OUTPUT || echo "name=$BRANCH" >> $GITHUB_OUTPUT

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry==2.1.3

      - name: Cache virtualenv
        uses: actions/cache@v6
        with:
          path: .venv
          # Key on poetry.lock — only invalidates when dependency versions change.
          # The installed group set is part of the key: keying on poetry.lock
          # alone would restore a venv built from a different --only= list and
          # never re-save it (actions/cache skips saving on an exact key hit),
          # re-installing the difference on every run.
          key: venv-lint-${{ runner.os }}-py3.14-main-lint-test-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-lint-${{ runner.os }}-py3.14-main-lint-test-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          # `test` is here for pyright, not to run tests: it type-checks tests/,
          # which imports pytest and fakeredis. Without them every such import
          # is an unresolved-import error.
          poetry install --only=main,lint,test --no-root

      - name: compile (syntax check)
        run: poetry run python -m compileall src/

      - name: ruff format --check
        run: poetry run ruff format --check src/ tests/

      - name: ruff check
        run: poetry run ruff check src/ tests/

      # No path argument: check src/ AND tests/, matching black above and the
      # bare `pyright` developers run locally. Checking only src/ is what let
      # tests/ accumulate 67 type errors unnoticed.
      - name: pyright
        run: poetry run pyright

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    needs: resolve-env
    env:
      ENVIRONMENT: ${{ needs.resolve-env.outputs.name }}
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install Poetry
        run: pip install poetry==2.1.3

      - name: Cache virtualenv
        uses: actions/cache@v6
        with:
          path: .venv
          key: venv-test-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-test-${{ runner.os }}-py3.14-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --only=main,test --no-root

      - name: Run tests with coverage
        run: |
          set -o pipefail
          poetry run pytest --tb=short -q --cov-report=xml --junitxml=pytest.xml | tee pytest-coverage.txt

      - name: Coverage comment
        id: coverage_comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml
          title: Test Coverage Report
          badge-title: Coverage


  container-test:
    name: Container Test
    runs-on: ubuntu-latest
    needs: resolve-env
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test stage
        uses: docker/build-push-action@v7
        with:
          context: .
          target: test
          load: true
          tags: discord-music-bot:test
          build-args: |
            ENVIRONMENT=${{ needs.resolve-env.outputs.name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests in container
        run: docker run --rm discord-music-bot:test
