name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry==2.1.3

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          # Key on poetry.lock — only invalidates when dependency versions change.
          key: venv-lint-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-lint-${{ runner.os }}-py3.13-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --only=main,lint --no-root

      - name: black --check
        run: poetry run black --check src/ tests/ --target-version py313

      - name: pyright
        run: poetry run pyright src/

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Poetry
        run: pip install poetry==2.1.3

      - name: Cache virtualenv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-test-${{ runner.os }}-py3.13-${{ hashFiles('poetry.lock') }}
          restore-keys: venv-test-${{ runner.os }}-py3.13-

      - name: Install dependencies
        run: |
          poetry config virtualenvs.in-project true
          poetry install --only=main,test --no-root

      - name: Run tests with coverage
        env:
          ENVIRONMENT: test
        run: |
          set -o pipefail
          poetry run pytest --tb=short -q --cov-report=xml --junitxml=pytest.xml | tee pytest-coverage.txt

      - name: Coverage comment
        id: coverage_comment
        uses: MishaKav/pytest-coverage-comment@main
        with:
          pytest-coverage-path: ./pytest-coverage.txt
          junitxml-path: ./pytest.xml
          title: Test Coverage Report
          badge-title: Coverage

      - name: Update README badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          sed -i '/<!-- Pytest Coverage Comment:Begin -->/,/<!-- Pytest Coverage Comment:End -->/c\<!-- Pytest Coverage Comment:Begin -->\n${{ steps.coverage_comment.outputs.coverageHtml }}\n<!-- Pytest Coverage Comment:End -->' README.md
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]"
          git push

  container-test:
    name: Container Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test stage
        uses: docker/build-push-action@v6
        with:
          context: .
          target: test
          load: true
          tags: discord-music-bot:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests in container
        run: docker run --rm discord-music-bot:test
