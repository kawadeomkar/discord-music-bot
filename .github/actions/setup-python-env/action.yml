name: Set up Python environment
description: Python 3.14 + pinned Poetry + a cached, in-project virtualenv.

# Extracted from three near-identical copies (ci.yml's lint and test jobs,
# security.yml). Each maintained its own cache key by hand, and the comment
# explaining the key's group-set component survived in only one of them — which
# is precisely how the next cache bug would have arrived.

inputs:
  groups:
    description: >-
      Poetry group list passed to --only=, e.g. "main,test". Part of the cache
      key via cache-prefix — see below.
    required: true
  cache-prefix:
    description: >-
      Distinguishes cache entries whose installed group set differs. This must
      change whenever `groups` does: keying on poetry.lock alone would restore a
      venv built from a different --only= list and then never re-save it
      (actions/cache skips saving on an exact key hit), re-installing the
      difference on every single run.
    required: true
  poetry-plugins:
    description: Extra Poetry plugins to install alongside Poetry itself.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v6
      with:
        python-version: '3.14'

    - name: Install Poetry
      shell: bash
      run: pip install poetry==2.1.3 ${{ inputs.poetry-plugins }}

    - name: Cache virtualenv
      uses: actions/cache@v6
      with:
        path: .venv
        key: venv-${{ inputs.cache-prefix }}-${{ runner.os }}-py3.14-${{ hashFiles('poetry.lock') }}
        restore-keys: venv-${{ inputs.cache-prefix }}-${{ runner.os }}-py3.14-

    # poetry.toml commits virtualenvs.in-project, so the venv lands at .venv/
    # and matches the cache path above without a `poetry config` call here.
    - name: Install dependencies
      shell: bash
      run: poetry install --only=${{ inputs.groups }} --no-root
