# Only needed while the GHCR package is private. Enable by uncommenting the
# entry in this overlay's kustomization.yaml, after creating the Secret:
#   kubectl --context k3s-production -n discord-music-bot \
#     create secret docker-registry ghcr-pull \
#     --docker-server=ghcr.io --docker-username=<gh-user> \
#     --docker-password=<read:packages PAT>
apiVersion: apps/v1
kind: Deployment
metadata:
  name: discord-music-bot
spec:
  template:
    spec:
      imagePullSecrets:
        - name: ghcr-pull
