apiVersion: v1
kind: ConfigMap
metadata:
  name: discord-music-bot-config
data:
  # Pods have no .git — without this, config._git_branch()'s subprocess
  # fallback fires a RuntimeWarning every boot and lands on "development".
  # The production overlay patches this to "production".
  ENVIRONMENT: development
  # Defaults in src/ assume compose host networking; cluster DNS instead.
  REDIS_URL: redis://redis:6379
  OTEL_SERVICE_NAME: discord-music-bot
  OTEL_EXPORTER_OTLP_ENDPOINT: http://lgtm:4317
  # Matches the bgutil plugin's built-in default (same-pod sidecar loopback);
  # set explicitly for greppability.
  POT_PROVIDER_URL: http://127.0.0.1:4416
  # Enables src/healthz.py's probe server. Compose never sets it, so the
  # compose pipeline is byte-for-byte unaffected.
  HEALTHZ_PORT: "8080"
  # NOW_PLAYING_UPDATE_INTERVAL_SECS is deliberately omitted (default 3.0);
  # this ConfigMap is where it — and the future YTDLP_POOL_WORKERS — would go.
  # OTEL_SDK_DISABLED stays a dev-only .env knob; do not add it here.
