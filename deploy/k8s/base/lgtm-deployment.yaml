apiVersion: apps/v1
kind: Deployment
metadata:
  name: lgtm
  labels:
    app: lgtm
spec:
  replicas: 1
  # Recreate: three RWO PVCs + Grafana's sqlite must never be double-mounted
  # by a RollingUpdate's briefly-overlapping pods.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: lgtm
  template:
    metadata:
      labels:
        app: lgtm
    spec:
      containers:
        - name: lgtm
          # Pinned, never :latest. This image moves its own data paths between
          # releases (0.29.0 writes everything under /data; older tags used
          # /tmp/loki, /tmp/tempo, /var/lib/grafana), and the volumeMounts below
          # are written against THIS version's layout — a floating tag silently
          # unmounts the PVCs by moving the paths out from under them. :latest
          # also defaults imagePullPolicy to Always: an unreviewed observability
          # upgrade on every redeploy, and ImagePullBackOff whenever Docker Hub
          # rate-limits the server's anonymous pulls.
          # Bumping: check `ls /data` in the new image against the mounts below.
          image: grafana/otel-lgtm:0.29.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            # From the dedicated grafana-admin Secret — deliberately NOT in
            # discord-music-bot-secrets, which is envFrom-mounted into the bot
            # (the bot has no business carrying Grafana's admin password).
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: GF_SECURITY_ADMIN_PASSWORD
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: grafana
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: grafana
            periodSeconds: 10
          # Four backends in a trench coat — cap it so an ingest burst can't
          # squeeze the bot. Base = dev sizing; production overlay raises to
          # 2Gi/500m requests, 6Gi limit (§3.5). Evicted first under node
          # pressure (no PriorityClass, Burstable QoS) — by design.
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 2Gi
          # otel-lgtm 0.29.0 keeps ALL runtime state under /data (verified in
          # the running pod: run-grafana.sh hard-exports GF_PATHS_DATA=
          # /data/grafana/data, loki-config.yaml sets path_prefix /data/loki,
          # tempo-config.yaml writes /data/tempo). These paths are the image's,
          # not ours — mounting anywhere else provisions PVCs that bind, mount,
          # and then sit empty while the real data lands on the container's
          # ephemeral layer and dies with the pod.
          # Only /data/grafana, /data/loki and /data/tempo are persisted;
          # /data/prometheus and /data/pyroscope stay ephemeral (metrics and
          # profiles are cheap to lose, and the plan specs three PVCs).
          # Safe to mount over: /data/grafana holds only runtime state (data/ +
          # downloaded plugins) — Grafana's binaries and dashboards live in
          # /otel-lgtm/grafana, so an empty PVC here is just a cold start.
          volumeMounts:
            - name: grafana-data
              mountPath: /data/grafana
            - name: tempo-data
              mountPath: /data/tempo
            - name: loki-data
              mountPath: /data/loki
            # subPath: mount the one file, not over /otel-lgtm (which holds
            # every binary and run script). Trade-off of subPath: this mount
            # does NOT live-update when the ConfigMap changes — fine here, Loki
            # only reads its config at startup and lgtm is strategy: Recreate.
            # But a ConfigMap-only edit won't restart the pod: after changing
            # loki-config.yaml, `kubectl rollout restart deployment/lgtm`.
            - name: loki-config
              mountPath: /otel-lgtm/loki-config.yaml
              subPath: loki-config.yaml
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: otel-grafana
        - name: tempo-data
          persistentVolumeClaim:
            claimName: otel-tempo
        - name: loki-data
          persistentVolumeClaim:
            claimName: otel-loki
        - name: loki-config
          configMap:
            name: loki-config
