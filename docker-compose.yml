---
services:
  discord-music-bot:
    container_name: discord-music-bot
    build:
      context: .
      dockerfile: Dockerfile
    image: discord-music-bot:${GIT_SHA:-latest}
    restart: always
    network_mode: host
    env_file:
    - .env
    environment:
      - ENVIRONMENT
      - OTEL_SERVICE_NAME=discord-music-bot
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://localhost:4317
      # Set OTEL_SDK_DISABLED=true in .env to disable tracing in local dev
    volumes:
      # yt-dlp's disk cache: player JS + EJS-solved sig/n challenges. Without it a
      # container restart re-pays the player fetch + challenge solve on the first song.
      - ytdlp-cache:/root/.cache/yt-dlp
    depends_on:
      redis:
        condition: service_healthy
      # otel-lgtm is intentionally NOT in depends_on.
      # The OTLP BatchSpanProcessor retries silently if otel-lgtm is slow to start,
      # so a hard dependency would break `docker compose up discord-music-bot redis`.
      # bgutil-pot-provider is intentionally NOT in depends_on either: the bot is
      # fully functional without it (web_safari degrades to token-less, android_vr
      # is untouched — see docs/PO_TOKEN_SIDECAR_PLAN.md §3.3).

  redis:
    image: redis:7-alpine
    container_name: discord-redis
    restart: always
    # volatile-lru, NOT allkeys-lru: the history:outbox list is persistent
    # (no TTL — it buffers played-song entries not yet drained to Postgres,
    # docs/POSTGRES_HISTORY_PLAN.md §3) and must never be an eviction
    # candidate. Every cache key (ytdl:*, spotify:*) and all guild:* keys —
    # including guild:{id}:history, a TTL'd display cache since the Phase C
    # cutover — carry TTLs, so volatile-lru evicts only reconstructible data.
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy volatile-lru
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    # Play-history archive (docs/POSTGRES_HISTORY_PLAN.md). The bot only uses
    # it when POSTGRES_URL is set in .env, e.g.
    #   POSTGRES_URL=postgresql://musicbot:musicbot@127.0.0.1:5432/musicbot
    # Intentionally NOT in the bot's depends_on: the bot is fully functional
    # without Postgres (the outbox buffers in Redis until it comes up), and a
    # hard dependency would break `docker compose up discord-music-bot redis`.
    image: postgres:18-alpine
    container_name: discord-postgres
    restart: always
    environment:
      - POSTGRES_USER=musicbot
      - POSTGRES_PASSWORD=musicbot
      - POSTGRES_DB=musicbot
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      # 18+ image layout: the declared volume moved to /var/lib/postgresql
      # (PGDATA is version-specific beneath it). Mounting the old .../data
      # path would silently store the cluster OUTSIDE the volume.
      - postgres-data:/var/lib/postgresql
      # Backup buffer (docs/POSTGRES_HISTORY_PLAN.md §8.1): pg_backup.sh dumps
      # here (write-then-rename, prune keep-7); an external process pulls
      # completed musicbot-*.dump files to long-term storage and must never
      # delete from it.
      - postgres-backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musicbot -d musicbot"]
      interval: 5s
      timeout: 3s
      retries: 5

  bgutil-pot-provider:
    # Mints GVS Proof-of-Origin tokens so web_safari can serve audio as a fallback
    # client (docs/PO_TOKEN_SIDECAR_PLAN.md). Version must match the
    # bgutil-ytdlp-pot-provider pin in pyproject.toml — plugin and server are
    # released in lockstep; bump both together.
    image: brainicism/bgutil-ytdlp-pot-provider:1.3.1
    container_name: discord-pot-provider
    restart: unless-stopped
    init: true
    ports:
      # The bot runs with network_mode: host and reaches this via 127.0.0.1:4416 —
      # the bgutil plugin's built-in default base_url.
      - "127.0.0.1:4416:4416"
    healthcheck:
      # The image ships no wget/curl — node (>=20, global fetch) is the only HTTP
      # client available.
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4416/ping').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  otel-lgtm:
    image: grafana/otel-lgtm:latest
    container_name: discord-otel-lgtm
    restart: unless-stopped
    ports:
      - "127.0.0.1:3014:3000"    # Grafana UI (localhost only)
      - "127.0.0.1:4317:4317"    # OTLP gRPC receiver
      - "127.0.0.1:4318:4318"    # OTLP HTTP receiver
    volumes:
      - otel-grafana:/var/lib/grafana
      - otel-tempo:/tmp/tempo
      - otel-loki:/tmp/loki
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis-data:
  postgres-data:
  postgres-backups:
  ytdlp-cache:
  otel-grafana:
  otel-tempo:
  otel-loki:
