# Git hooks. Install them with `just hooks`.
#
# These are a CONVENIENCE, never the gate. Hooks are per-clone, absent on a fresh
# checkout, and one `--no-verify` from being skipped — so nothing whose absence
# would be a defect may depend on them. CI plus branch protection remains the
# enforcement boundary, and .github/workflows/ci.yml still runs these same ruff
# commands explicitly.
#
# The split across stages is a time budget, and it is the whole design:
#
#   pre-commit  ruff (~0.13s) + trivia    fast enough to never think about
#   pre-push    just check (~24s)         the "will CI pass" gate, once per push
#
# pyright (6s) and pytest (14s) are deliberately NOT on pre-commit. A hook slow
# enough to interrupt your train of thought is a hook that teaches you to reach
# for --no-verify, and that habit costs more than the checks ever caught.
#
# Note: the formatting hooks REWRITE files. A commit that trips one fails and
# leaves the fixes unstaged — `git add` them and commit again. That is working as
# intended, not a bug.

default_install_hook_types: [pre-commit, pre-push]

# Required, not cosmetic. pre-commit's default for a hook that omits `stages` is
# EVERY stage, not "pre-commit" — so without this line the ruff hooks also ran on
# pre-push, against the whole origin..HEAD file list, rewriting files and leaving
# a failed push with unstaged edits to already-finished commits.
#
# This covers only hooks that declare no stages of their own. Three of the
# pre-commit-hooks below ship upstream stages that outrank it and opt out
# individually; just-check opts back IN to pre-push.
default_stages: [pre-commit]

# coverage.json is a generated artifact that happens to be tracked (last written
# 2026-06-17, long stale). Reformatting a build output produces pure churn, and a
# hook that rewrites files nobody edits is a hook people learn to distrust.
# It arguably should not be in git at all — but that is a separate decision, and
# excluding it here does not depend on making it.
exclude: '^coverage\.json$'

repos:
  # rev must match the ruff version in pyproject.toml's lint group: the hook runs
  # ruff from its own isolated env, so a drift here means the hook formats one way
  # and `just lint` / CI checks another. `just hooks-update` bumps this; bump the
  # poetry constraint in the same commit.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.22
    hooks:
      # Lint before format: --fix can emit changes that need reformatting.
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      # These three ship `stages: [pre-commit, pre-push, manual]` in the upstream
      # .pre-commit-hooks.yaml, and a hook's OWN stages beat this file's
      # default_stages — so the top-level default does not reach them and they
      # have to opt out one by one. It matters most for the two fixers: on a push
      # they would rewrite every file in origin..HEAD, abort the push, and leave
      # unstaged edits behind on already-finished commits.
      - id: check-added-large-files
        stages: [pre-commit]
      - id: end-of-file-fixer
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: check-toml
      - id: check-yaml
        # deploy/k8s/ manifests (docs/K8S_DEPLOYMENT_PLAN.md) are multi-document
        # YAML, and Kustomize output routinely is. Set now so the hook does not
        # start failing the day those land.
        args: [--allow-multiple-documents]

  - repo: local
    hooks:
      - id: just-check
        name: just check (ruff + pyright + pytest)
        # `language: system` runs this against git's ambient PATH, so `just` must be
        # installed system-wide -- see the README's Requirements. Do NOT "fix" that
        # with `language: python` + `additional_dependencies: [rust-just]`:
        # pre-commit sets VIRTUAL_ENV to the isolated hook env, the justfile's
        # VENV_BIN follows $VIRTUAL_ENV, and every tool would then be looked up
        # inside a venv containing only `just`. Measured, not theorised.
        #
        # Unlike `make`, this CAN fail for want of the runner. A push from a GUI
        # client with a minimal PATH may not find `just`; --no-verify is the escape
        # hatch, as it always was.
        entry: just check
        language: system
        # Whole-repo gate: pyright is a whole-program analysis and the test suite
        # is not partitioned by path, so passing filenames would be meaningless.
        pass_filenames: false
        # always_run is the necessary partner to pass_filenames: false. pre-commit
        # skips a hook whose filename list came out empty, and a push containing
        # only deletions produces exactly that — the gate would report "Skipped"
        # on precisely the change most likely to break the build.
        always_run: true
        stages: [pre-push]

      # Keeps the task file canonically formatted, which `make` had no equivalent
      # for. Runs on commit rather than push: it is ~0.01s and only fires when the
      # justfile itself is staged. Same PATH requirement as just-check above.
      - id: just-fmt
        name: just --fmt --check
        entry: just --fmt --check --justfile
        language: system
        files: ^justfile$
